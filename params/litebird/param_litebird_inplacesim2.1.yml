experiments:
  LiteBIRD:
    enabled: true
    is_sim: true
    pix_is_compressed: false
    psi_is_compressed: false
    data_type: "TOD"
    experiment_id: "litebird_sim_spawndetectors"  # Decides expected data format, what TOD reader is used, etc.
    # bad_PIDs_path: "/mn/stornext/d23/cmbco/jonas/c4_testing/Commander4/badPIDs.npy"
    Fourier_times_path: "/mn/stornext/d23/cmbco/jonas/c4_testing/analysis/FFT_times_0_399999.npy"
    num_scans: 9142

    replace_tod_with_sim: true
    sim_params:
      include_CMB: True
      include_ThermalDust: True
      include_Synchrotron: True
      include_FreeFree: True
      include_SpinningDust: True
      include_OrbitalDipole: True
      noise_sigma0: 1.0
