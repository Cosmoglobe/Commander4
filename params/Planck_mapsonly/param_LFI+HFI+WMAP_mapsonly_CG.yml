general:
  MPI_config:
    ntask_tod: 0
    ntask_compsep_I: 15
    ntask_compsep_QU: 13
  nthreads_tod: 1
  nthreads_compsep: 24

  niter_gibbs: 1

  perform_compsep: true

  perform_compsep: true

  output_stats: False

  galactic_mask: True
  pixel_compsep_sampling: False
  smooth_to_common_res: False

  CG_max_iter: 60
  CG_max_iter_pol: 60
  CG_err_tol: 1.0e-100
  CG_float_precision: "single"
  CG_real_alm_mode: False

  chains_to_write: [1,]
  write_orb_dipole_maps_to_chain: True
  write_corr_noise_maps_to_chain: True
  write_sky_model_maps_to_chain: True
  chain_maps_nside: "native"
  chain_maps_interval: 1

  init_from_chain: false

  output_paths:
    chains: "../cmdr4_chains/Planck_mapsonly/test_CG_1000iter_priors/"
    stats: "../cmdr4_stats/Planck_mapsonly/test_CG_1000iter_priors/"

  logging:
    console:
      level: 'debug'
    file:
      level: 'info'
      filename: '../cmdr4_logs/Planck_mapsonly/output.log'

compsep:
  dense_matrix_debug_mode: false  # Solve system first with dense matrix math, for debugging CG. Very slow for nside>32.
  preconditioner: JointPreconditioner #NoiseOnlyPreconditioner #FullPreconditioner #MixingMatrixPreconditioner #BeamOnlyPreconditioner #


components:
  CMB:
    enabled: true
    component_class: "CMB"
    params:
      polarization: "IQU" 
      longname: "CMB"
      shortname: "cmb"
      smoothing_prior_FWHM: 10.0 # arcmin
      smoothing_prior_amplitude: 1.0e+7 #1.0  # uK_RJ^2
      lmax: 2048
      smoothing_scale: 0
      spatially_varying_MM: False

  ThermalDust:
    enabled: true
    component_class: "ThermalDust"
    params:
      polarization: "IQU"
      longname: "Thermal-Dust"
      shortname: "dust"
      smoothing_prior_FWHM: 5.0 # arcmin
      smoothing_prior_amplitude:  1.0e+7  # uK_RJ^2
      beta: 1.56
      T: 20
      nu0: 545.0
      lmax: 4096
      smoothing_scale: 0.0
      spatially_varying_MM: False

  Synchrotron:
    enabled: true
    component_class: "Synchrotron"
    params:
      polarization: "IQU" 
      longname: "Synchrotron"
      shortname: "sync"
      smoothing_prior_FWHM: 60.0 # arcmin
      smoothing_prior_amplitude: 3.0e+3  # uK_RJ^2
      beta: -3.1
      nu0: 30
      lmax: 1024
      smoothing_scale: 0.0
      spatially_varying_MM: False

  FreeFree:
    enabled: false
    component_class: "FreeFree"
    params:
      polarization: "I" 
      longname: "Free-Free"
      shortname: "ff"
      smoothing_prior_FWHM: 0.0 # 60.0 # arcmin
      smoothing_prior_amplitude: 3.0e+13  # uK_RJ^2
      T: 7000
      nu0: 0.408 #40
      lmax: 1024
      smoothing_scale: 0.0
      spatially_varying_MM: False


