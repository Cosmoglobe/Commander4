# Parameter file for doing Planck LFI TOD processing, but with per-pixel component separation
# Note that this means all maps have to be common resolution (chosen to be nside=512).
# Useful if you are primarily working on the TOD processing and don't want the CG overhead.

general:
  MPI_config:
    ntask_tod: 0  # Map-only processing: No TOD tasks.
    ntask_compsep_I: 7
    ntask_compsep_QU: 7
  nthreads_tod: 1
  nthreads_compsep: 1

  niter_gibbs: 2

  perform_compsep: false

  nside: 1024

  noise_fknee: 0.1
  noise_alpha: -0.9

  output_stats: False

  CG_float_precision: "single"

  init_from_chain: false

  galactic_mask: True
  pixel_compsep_sampling: True
  common_res_fwhm: 60.0  # arcmin; must be >= every band's beam (here Haslam at 60').

  output_paths:
    chains: "../cmdr4_chains/Planck+WMAP_mapsonly_perpix_v2/"
    stats: "../cmdr4_stats/Planck+WMAP_mapsonly_perpix_v2/"

  logging:
    console:
      level: 'info'
    file:
      level: 'info'
      filename: '../cmdr4_logs/Planck+WMAP_mapsonly_perpix_v2.log'


components:
  CMB:
    enabled: true
    component_class: "CMB"
    params:
      polarization: "IQU" 
      longname: "CMB"
      shortname: "cmb"
      smoothing_prior_FWHM: 30.0 # arcmin
      smoothing_prior_amplitude: 1.0e+7 #1.0  # uK_RJ^2
      lmax: 1024
      smoothing_scale: 0
      spatially_varying_MM: False

  ThermalDust:
    enabled: true
    component_class: "ThermalDust"
    params:
      polarization: "IQU"
      longname: "Thermal-Dust"
      shortname: "dust"
      smoothing_prior_FWHM: 5.0 # 10.0 # arcmin
      smoothing_prior_amplitude: 2.0e-3  # uK_RJ^2
      beta: 1.56
      T: 20
      nu0: 545
      lmax: 1024
      smoothing_scale: 0.0
      spatially_varying_MM: False

  Synchrotron:
    enabled: true
    component_class: "Synchrotron"
    params:
      polarization: "IQU" 
      longname: "Synchrotron"
      shortname: "sync"
      smoothing_prior_FWHM: 60.0 # arcmin
      smoothing_prior_amplitude: 2.0e-2  # uK_RJ^2
      beta: -3.1
      nu0: 30
      lmax: 512
      smoothing_scale: 0.0
      spatially_varying_MM: False

  FreeFree:
    enabled: true
    component_class: "FreeFree"
    params:
      polarization: "I" 
      longname: "Free-Free"
      shortname: "ff"
      smoothing_prior_FWHM: 30.0 # arcmin
      smoothing_prior_amplitude: 1.0e+9  # uK_RJ^2
      T: 7000
      nu0: 0.408 #40
      lmax: 512
      smoothing_scale: 0.0
      spatially_varying_MM: False
  
  RadioSources:
    enabled: False
    component_class: "RadioSources"
    params:
      polarization: "I" 
      longname: "RadioSources"
      shortname: "radsources"
      template_path: "/mn/stornext/d5/data/duncanwa/WMAP/data/init_radio_BP8.11.dat"
      nu_0: 30.0  # Ghz
      lmax: "full" #just a placeholder
      smoothing_scale: 0 # placeholder? Do we ever want a smoothing of point sources?
      sample_alphas: False
      
  SpinningDust:
    enabled: False
    component_class: "SpinningDust"
    params:
      polarization: "I"
      longname: "SpinningDust"
      shortname: "sdust"
      template_path: "/mn/stornext/d5/data/duncanwa/WMAP/data/spdust2_cnm.dat"
      smoothing_prior_FWHM: 0.0 # arcmin
      smoothing_prior_amplitude: 1.0e+10  # uK_RJ^2
      nu_peak: 25.3  # Ghz
      nu_0: 22.0  # Ghz
      lmax: 1000
      smoothing_scale: 0 # 30.0
      spatially_varying_MM: False


