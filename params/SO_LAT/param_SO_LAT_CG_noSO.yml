general:
  MPI_config:
    ntask_tod: 0
    ntask_compsep_I: 7
    ntask_compsep_QU: 7
  nthreads_tod: 1
  nthreads_compsep: 48

  niter_gibbs: 1

  perform_compsep: true

  nside: 512

  corr_noise:
    sample_corr_noise: True
    sample_corr_noise_from_iter_num: 1
    sample_noise_params: True     # Resample noise-model params (needs sample_corr_noise).
    sample_sigma0: True            # Re-estimate sigma0 from the n_corr-subtracted residual.
    CG_err_tol: 1.0e-4             # Correlated-noise CG convergence tolerance.
    CG_max_iter: 60                # Max CG iterations; 0 -> skip CG, use stationary fallback.
    nomono: False                 # Project the per-scan monopole out of n_corr (Fortran "nomono").
    onlymono: False               # Model the correlated noise as only the per-scan offset.
    sigma0_decimation: 1          # Block-average factor for the sigma0 estimator.
    psd_fit_nu_min: 0.0           # Min frequency (Hz) for noise-PSD parameter fitting.
    psd_fit_nu_max: 2.0           # Max frequency (Hz) for noise-PSD parameter fitting.
    psd_bin: False                # Fit every Fourier mode (False) or mode-weighted binned PSD.
    sigma0_method: pairwise     # White-noise estimator: 'pairwise' (first-difference) or 'binned_psd'.
  gain_calib_downsample_time: 1.0   # [s] Averaging chunk duration for gain-calibration TODs (0 = off).
  gap_fill_method: wn         # Gap fill for non-CG (gain) steps: 'wn' | 'fallback' | 'full_cg'.
  abs_gain:                           # Absolute (band-global) gain g0.
    sample: false
    sample_from_iter_num: 2
    calibrate_against: orbital_dipole # "orbital_dipole" | "full_sky" | "sky"; per-band overridable.
  rel_gain:                           # Per-detector relative gain.
    sample: false
    sample_from_iter_num: 2
    calibrate_against: full_sky       # "orbital_dipole" | "full_sky" | "sky"; per-band overridable.
  temporal_gain:                      # Per-scan temporal gain variations.
    sample: false
    sample_from_iter_num: 2
    calibrate_against: full_sky       # "orbital_dipole" | "full_sky" | "sky"; per-band overridable.

  perform_compsep: true

  output_stats: False

  galactic_mask: True
  pixel_compsep_sampling: False
  smooth_to_common_res: False

  CG_max_iter: 1000
  CG_max_iter_pol: 1000
  CG_err_tol: 1.0e-100
  CG_float_precision: "single"
  CG_real_alm_mode: False


  chains_to_write: [1,]
  write_orb_dipole_maps_to_chain: True
  write_corr_noise_maps_to_chain: True
  write_sky_model_maps_to_chain: True
  write_ncorr_tods_to_chain: False   # DEBUG ONLY: full per-sample n_corr TODs (very large data).
  chain_maps_nside: "native"
  chain_maps_interval: 1

  init_from_chain: false

  output_paths:
    chains: "../cmdr4_chains/SO/test_n4096_CG_noSO_all512_1000iter_nopriors_samelmax_syncprior/"
    stats: "../cmdr4_stats/SO/test_n4096_CG_noSO_all512_1000iter_nopriors_samelmax_syncprior/"

  logging:
    console:
      level: 'debug'
    file:
      level: 'info'
      filename: '../cmdr4_logs/SO/test_n4096_CG_noSO_600iter_CMB0.log'

compsep:
  dense_matrix_debug_mode: false  # Solve system first with dense matrix math, for debugging CG. Very slow for nside>32.
  preconditioner: JointPreconditioner #NoiseOnlyPreconditioner #FullPreconditioner #MixingMatrixPreconditioner #BeamOnlyPreconditioner #


components:
  CMB:
    enabled: true
    component_class: "CMB"
    params:
      polarization: "IQU" 
      longname: "CMB"
      shortname: "cmb"
      smoothing_prior_FWHM: 0.0 # 10.0 # arcmin
      smoothing_prior_amplitude: 1.0e+30 # 1.0e+7 #1.0  # uK_RJ^2
      lmax: 1024 #1024
      smoothing_scale: 0
      spatially_varying_MM: False

  ThermalDust:
    enabled: true
    component_class: "ThermalDust"
    params:
      polarization: "IQU"
      longname: "Thermal-Dust"
      shortname: "dust"
      smoothing_prior_FWHM: 0.0 # 5.0 # 10.0 # arcmin
      smoothing_prior_amplitude:  2.0e+30 # 1.0e+6  # uK_RJ^2
      beta: 1.56
      T: 20
      nu_ref: [857, 353]  # [I, QU]
      units: "uK_RJ"
      lmax: 1024 #2048
      smoothing_scale: 0.0
      spatially_varying_MM: False

  Synchrotron:
    enabled: true
    component_class: "Synchrotron"
    params:
      polarization: "IQU" 
      longname: "Synchrotron"
      shortname: "sync"
      smoothing_prior_FWHM: 60.0 # arcmin
      smoothing_prior_amplitude: 3.0e+14  # uK_RJ^2
      beta: -3.1
      nu_ref: [0.408, 30]  # [I, QU]
      units: "uK_RJ"
      lmax: 1024 #512
      smoothing_scale: 0.0
      spatially_varying_MM: False

  FreeFree:
    enabled: true
    component_class: "FreeFree"
    params:
      polarization: "I" 
      longname: "Free-Free"
      shortname: "ff"
      smoothing_prior_FWHM: 0.0 # 60.0 # arcmin
      smoothing_prior_amplitude: 1.0e+30 # 3.0e+13  # uK_RJ^2
      T: 7000
      nu_ref: 40
      units: "uK_RJ"
      lmax: 1024 #512
      smoothing_scale: 0.0
      spatially_varying_MM: False


