experiments:
  SO_LAT:
    enabled: true
    experiment_id: "SO_LAT"
    is_sim: false
    tod_is_compressed: true
    pix_is_compressed: true
    psi_is_compressed: true
    data_type: "TOD"
    mapmaker: "bin"
    Fourier_times_path: "/mn/stornext/d23/cmbco/jonas/c4_testing/analysis/FFT_times_0_399999.npy"
    num_scans: 95
    bad_data_bitmask: 0b11111111111111111111111111111111  # Entries in the 32-bit bitmask corresponding to bad data.
    jump_bitmask: 0b00000000000000000000000000000010
    bands:
      SO_LAT_90GHz:
        enabled: true
        num_MPI_tasks: 48
        eval_nside: 2048
        fwhm: 60.0 # [arcmin]
        freq: 90.0 # [GHz]
        polarization: "IQU"
        noise_psd: "NoisePSDOof"
        filelist: "/mn/stornext/d23/cmbco/jonas/c4_testing/Commander4_SO/filelist_SO_LAT_i1ws2.txt"
        detectors:
          !inc detectors/detectors.yml