# This parameter file contains a reduced set of Planck LFI detectors: 6 (2 per band) out of 22 total.
# It does per-pixel component separation.

general:
  MPI_config:
    ntask_tod: 64
    ntask_compsep_I: 8
    ntask_compsep_QU: 8
  nthreads_tod: 1
  nthreads_compsep: 8

  niter_gibbs: 20

  nside: 512

  corr_noise:
    sample_corr_noise: False
    sample_corr_noise_from_iter_num: 2
    sample_noise_params: False     # Resample noise-model params (needs sample_corr_noise).
    sample_sigma0: True            # Re-estimate sigma0 from the n_corr-subtracted residual.
    CG_err_tol: 1.0e-4             # Correlated-noise CG convergence tolerance.
    CG_max_iter: 60                # Max CG iterations; 0 -> skip CG, use stationary fallback.
    nomono: False                 # Project the per-scan monopole out of n_corr (Fortran "nomono").
    onlymono: False               # Model the correlated noise as only the per-scan offset.
    sigma0_decimation: 1          # Block-average factor for the sigma0 estimator.
    psd_fit_nu_min: 0.0           # Min frequency (Hz) for noise-PSD parameter fitting.
    psd_fit_nu_max: 2.0           # Max frequency (Hz) for noise-PSD parameter fitting.
    psd_bin: False                # Fit every Fourier mode (False) or mode-weighted binned PSD.
    sigma0_method: pairwise     # White-noise estimator: 'pairwise' (first-difference) or 'binned_psd'.
  gain_calib_downsample_time: 1.0   # [s] Averaging chunk duration for gain-calibration TODs (0 = off).
  gap_fill_method: wn         # Gap fill for non-CG (gain) steps: 'wn' | 'fallback' | 'full_cg'.
  abs_gain:                           # Absolute (band-global) gain g0.
    sample: true
    sample_from_iter_num: 2
    calibrate_against: orbital_dipole # "orbital_dipole" | "full_sky" | "sky"; per-band overridable.
  rel_gain:                           # Per-detector relative gain.
    sample: true
    sample_from_iter_num: 2
    calibrate_against: full_sky       # "orbital_dipole" | "full_sky" | "sky"; per-band overridable.
  temporal_gain:                      # Per-scan temporal gain variations.
    sample: true
    sample_from_iter_num: 2
    calibrate_against: full_sky       # "orbital_dipole" | "full_sky" | "sky"; per-band overridable.

  CG_float_precision: "single"

  output_stats: False

  galactic_mask: True
  pixel_compsep_sampling: True
  common_res_fwhm: 60.0  # arcmin; must be >= every band's beam (here Haslam at 60').

  chains_to_write: [1,]
  write_orb_dipole_maps_to_chain: True
  write_corr_noise_maps_to_chain: True
  write_sky_model_maps_to_chain: True
  write_ncorr_tods_to_chain: False   # DEBUG ONLY: full per-sample n_corr TODs (very large data).
  chain_maps_nside: 128
  chain_maps_interval: 5

  init_chain_path: false

  output_paths:
    chains: "../cmdr4_chains/PlanckTODs_perpix_test/"
    stats: "../cmdr4_stats/PlanckTODs_perpix_test/"

  logging:
    console:
      level: 'debug'
    file:
      level: 'info'
      filename: '../cmdr4_logs/output_PlanckTODs_perpix_test'

# Linear amplitude (CG) sampling groups (the per-pixel solver is the amplitude sampler here).
CG_sampling_groups_compsep:
  sample_amps_perpix:
    enabled: true
    sample_class: "amplitude_sampler_perpix"
    # comps: [CMB, Synchrotron, ThermalDust, FreeFree]
    comps: [CMB, Synchrotron, ThermalDust]
    bands: [Planck30GHz, Haslam408MHz, WMAPKa, WMAPQ1, WMAPQ2, WMAPV1, WMAPV2, Planck857GHz, Planck353GHz]

# Non-linear (MCMC) spectral-index sampling groups. None enabled here.
MCMC_sampling_groups_compsep: {}


components:
  CMB:
    enabled: true
    component_class: "CMB"
    params:
      polarization: "IQU" 
      longname: "CMB"
      shortname: "cmb"
      init_from: "/mn/stornext/d23/cmbco/hfi/common/data/init_cmb_amp_BP8.1_v1.fits"
      smoothing_prior_FWHM: 30.0 # arcmin
      smoothing_prior_amplitude: 1.0e+7 #1.0  # uK_RJ^2
      lmax: 1024
      smoothing_scale: 0
      spatially_varying_MM: False

  ThermalDust:
    enabled: true
    component_class: "ThermalDust"
    params:
      polarization: "IQU"
      longname: "Thermal-Dust"
      shortname: "dust"
      init_from: "/mn/stornext/d23/cmbco/hfi/common/data/init_dust_amp_BP8.1_v1.fits"
      smoothing_prior_FWHM: 5.0 # 10.0 # arcmin
      smoothing_prior_amplitude: 2.0e-3  # uK_RJ^2
      beta: 1.56
      T: 20
      nu_ref: [857, 353]  # [I, QU]
      units: "uK_RJ"
      lmax: 1024
      smoothing_scale: 0.0
      spatially_varying_MM: False

  Synchrotron:
    enabled: true
    component_class: "Synchrotron"
    params:
      polarization: "IQU" 
      longname: "Synchrotron"
      shortname: "sync"
      init_from: "/mn/stornext/d23/cmbco/hfi/common/data/init_synch_amp_BP8.1_v1.fits"
      smoothing_prior_FWHM: 60.0 # arcmin
      smoothing_prior_amplitude: 2.0e-2  # uK_RJ^2
      beta: -3.1
      nu_ref: [0.408, 30]  # [I, QU]
      units: "uK_RJ"
      lmax: 512
      smoothing_scale: 0.0
      spatially_varying_MM: False

  FreeFree:
    enabled: false
    component_class: "FreeFree"
    params:
      polarization: "I" 
      longname: "Free-Free"
      shortname: "ff"
      smoothing_prior_FWHM: 30.0 # arcmin
      smoothing_prior_amplitude: 1.0e+9  # uK_RJ^2
      T: 7000
      nu_ref: 40
      units: "uK_RJ"
      lmax: 512
      smoothing_scale: 0.0
      spatially_varying_MM: False
  
  RadioSources:
    enabled: False
    component_class: "RadioSources"
    params:
      polarization: "I" 
      longname: "RadioSources"
      shortname: "radsources"
      template_path: "/mn/stornext/d5/data/duncanwa/WMAP/data/init_radio_BP8.11.dat"
      nu_0: 30.0  # Ghz
      lmax: "full" #just a placeholder
      smoothing_scale: 0 # placeholder? Do we ever want a smoothing of point sources?
      sample_alphas: False
      
  SpinningDust:
    enabled: False
    component_class: "SpinningDust"
    params:
      polarization: "I"
      longname: "SpinningDust"
      shortname: "sdust"
      template_path: "/mn/stornext/d5/data/duncanwa/WMAP/data/spdust2_cnm.dat"
      smoothing_prior_FWHM: 0.0 # arcmin
      smoothing_prior_amplitude: 1.0e+10  # uK_RJ^2
      nu_peak: 25.3  # Ghz
      nu_0: 22.0  # Ghz
      lmax: 1000
      smoothing_scale: 0 # 30.0
      spatially_varying_MM: False


