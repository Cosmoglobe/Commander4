# Example simgen parameter file.
#
# Run from the `aux` directory:
#     mpirun -n 4 python -m simgen -p simgen/params/example_param.yml
#
# It writes per-band directories of per-scan HDF5 files + a filelist.txt, in the format read by
# `tod_reader_litebird_sim`. To ingest in Commander4, point a band's `filelist:` at the generated
# filelist.txt and set the experiment's `experiment_id: "litebird_sim"`, `replace_tod_with_sim: false`,
# and `Fourier_times_path:` at an existing FFT-times .npy file.

general:
  nside: 64                 # Working HEALPix nside for sky-map construction.
  units: "uK_RJ"            # TOD and sky unit (sigma0 is in this unit, per sample).
  CG_float_precision: "single"   # Required by the reused Commander4 component constructors.
  seed: 1234                # Base RNG seed (CMB realization + per-(band,scan,det) noise).
  output_dir: "../cmdr4_sims/simgen_example/"

# --- Sky components: the SAME block shape as a Commander4 param file. Each component adds an
# optional `template:` block selecting the spatial template source (PySM3 preset or a FITS map);
# frequency scaling reuses commander4.sky_models.component.<component_class>.get_sed.
components:
  CMB:
    enabled: true
    component_class: "CMB"
    params:
      polarization: "IQU"
      shortname: "cmb"
      lmax: 191
      solar_dipole: true     # Add the BEYONDPLANCK solar dipole to the CMB (l=1, intensity).
      # cosmology: {H0: 67.5, ombh2: 0.022, omch2: 0.122, mnu: 0.06, omk: 0, tau: 0.06, As: 2.0e-9, ns: 0.965}

  ThermalDust:
    enabled: true
    component_class: "ThermalDust"
    params:
      polarization: "IQU"
      shortname: "dust"
      beta: 1.54
      T: 20
      nu_ref: 857            # GHz (scalar, or [nu_I, nu_QU]; the I value is used for the template)
      lmax: 191
      template: {source: "pysm3", preset: "d0"}

  Synchrotron:
    enabled: true
    component_class: "Synchrotron"
    params:
      polarization: "IQU"
      shortname: "sync"
      beta: -3.1
      nu_ref: 23
      lmax: 191
      template: {source: "pysm3", preset: "s5"}

simulation:
  nscans: 100               # Number of scans per band (more -> better sky coverage).
  scan_duration_sec: 600    # Wall-clock length of one scan; sample count is round(dur*fsamp), per band.
  npsi: 4096                # psi digitization bins for Huffman storage (only used when compress: true).
  orbital_dipole: true      # Bake the relativistic orbital dipole into the TOD (uses pointing vsun).
  compress: true            # Huffman-compress pix/psi (false -> plain int32/float32 arrays). flag is always compressed.

  pointing:
    strategy: "planck_scan"      # "planck_scan" (analytic) | "file" (load precomputed pointing H5)
    los_angle: 85.0
    spin_angle_tilt: 7.5
    spin_rate: 1.00165345964511  # rpm
    mission_start: "2009-08-13T00:00:00"
    # For strategy "file":
    # file_path: "/path/to/pointing.h5"
    # theta_key: "theta"   # phi_key: "phi"   psi_key: "psi"   vsun_key: "orbital_dir_vec"

  noise:                    # Global default; bands may override with their own `noise:` block.
    white: true
    oof: {enabled: true, fknee: 0.1, alpha: -1.0}

  modifiers:
    crosstalk: {enabled: true}   # Per-band cross-talk matrices are defined on the bands below.

  # Bolometer transfer function (per-detector time response). This run-wide block is the default for
  # every detector; a detector overrides it with its own `tau_ms`/`tau_sec` or a `transfer_function`
  # block (see the detectors below). H(f) is DC-normalized (H(0)=1), so it only changes the temporal
  # shape (scan-direction lag/smearing), not the calibration. Planck HFI time constants are ~10 ms.
  transfer_function:
    enabled: true
    tau_ms: 10.0               # single-pole default: H(f) = 1 / (1 + 2*pi*i*f*tau)

experiments:
  SimSat:
    enabled: true
    bands:
      Band30GHz:
        enabled: true
        freq: 30.0          # GHz
        fwhm: 60.0          # arcmin
        fsamp: 32.5         # Hz
        eval_nside: 64
        data_nside: 64
        sigma0: 100.0       # per-sample white-noise RMS [uK_RJ] (band default; per-detector overridable)
        polarization: "IQU"
        crosstalk: {enabled: true, coupling: 0.01}   # uniform off-diagonal leakage; or matrix: [[...]]
        detectors:          # inline dict (name -> per-detector params)
          det30_a: {psi_offset_deg: 0.0, tau_ms: 12.0}   # override the run-wide time constant
          det30_b: {psi_offset_deg: 45.0, transfer_function: {enabled: false}}  # no TF for this det

      Band100GHz:
        enabled: true
        freq: 100.0
        fwhm: 40.0
        fsamp: 32.5
        eval_nside: 64
        data_nside: 64
        sigma0: 80.0
        polarization: "IQU"
        crosstalk: {enabled: true, coupling: 0.02}
        detectors: !inc detectors_example/band100.yml   # same !inc mechanism as the main param files
